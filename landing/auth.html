      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'] },

              50: '#F7FBFF',

  <style>
    :root {
      color-scheme: light;
      --bg: #F7FBFF;
      --text: #0B2A4A;
      --muted: #4B6F8E;
      --blue: #0F4C81;
      --blue-2: #2563EB;
      --line: #D6E8FF;
      --soft: #EAF4FF;
    }

    * { box-sizing: border-box; }

    body {
      min-height: 100vh;
      margin: 0;
      background:
        radial-gradient(circle at 12% -8%, rgba(37,99,235,.13), transparent 34rem),
        radial-gradient(circle at 90% 4%, rgba(94,160,232,.12), transparent 30rem),
        linear-gradient(180deg, #F7FBFF 0%, #FFFFFF 32%, #F7FBFF 100%);
      color: var(--text);
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -1;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(15,76,129,.045) 1px, transparent 1px),
        linear-gradient(90deg, rgba(15,76,129,.045) 1px, transparent 1px);
      background-size: 44px 44px;
      mask-image: radial-gradient(circle at 50% 18%, black 0%, transparent 72%);
    }

    .text-gradient {
      color: #0F4C81;
      background: linear-gradient(135deg, #0B2A4A 0%, #0F4C81 42%, #2563EB 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .auth-card {
      animation: cardIn .5s ease-out both;
      background: rgba(255,255,255,.88);
      border: 1px solid rgba(214,232,255,.95);
      box-shadow: 0 24px 70px rgba(15,76,129,.12);
      backdrop-filter: blur(18px);
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(18px) scale(.985); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .btn-primary {
      background: linear-gradient(135deg, #0F4C81 0%, #2563EB 100%);
      color: #fff;
      box-shadow: 0 16px 38px rgba(37,99,235,.22);
      transition: transform .18s ease, box-shadow .18s ease, filter .18s ease, opacity .18s ease;
    }

    .btn-primary:hover:not(:disabled) {
      transform: scale(1.02);
      filter: saturate(1.06);
      box-shadow: 0 0 0 4px rgba(37,99,235,.08), 0 20px 54px rgba(37,99,235,.30);
    }

    .btn-google {
      transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease, background-color .18s ease;
    }

    .btn-google:hover:not(:disabled) {
      transform: translateY(-1px);
      border-color: #A9CDF8;
      box-shadow: 0 16px 42px rgba(15,76,129,.10);
      background: #FFFFFF;
    }

    .field-input {
      transition: border-color .18s ease, box-shadow .18s ease, background-color .18s ease;
    }

    .field-input:focus {
      border-color: #2563EB;
      box-shadow: 0 0 0 4px rgba(37,99,235,.10);
    }

    .tab-indicator {
      transition: transform .3s cubic-bezier(.2,.8,.2,1);
    }

    .error-box {
      animation: errorIn .22s ease-out both;
    }

    @keyframes errorIn {
      from { opacity: 0; transform: translateY(-8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .spinner {
      animation: spin .8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: .001ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: .001ms !important;
      }
    }
  </style>
</head>

  <script>
    // Supabase placeholders: sostituiscili con URL e publishable key del progetto.
    const SUPABASE_URL = 'https://xhifnparcouxsypkjcmn.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_dVYESGcHAV13d5aI1uC7wQ_pQ0r1qT2';
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const DASHBOARD_URL = '/dashboard.html';

    const state = {
      mode: 'login',
      loading: false,
      errorTimeout: null
    };

    const els = {
      loginTab: document.getElementById('login-tab'),
      registerTab: document.getElementById('register-tab'),
      tabIndicator: document.getElementById('tab-indicator'),
      loginPanel: document.getElementById('login-panel'),
      registerPanel: document.getElementById('register-panel'),
      errorBox: document.getElementById('error-box'),
      errorText: document.getElementById('error-text'),
      loginForm: document.getElementById('login-form'),
      registerForm: document.getElementById('register-form'),
      loginSubmit: document.getElementById('login-submit'),
      registerSubmit: document.getElementById('register-submit'),
      loginGoogle: document.getElementById('login-google'),
      registerGoogle: document.getElementById('register-google'),
      termsCheckbox: document.getElementById('terms-checkbox'),
      registerPassword: document.getElementById('register-password'),
      strengthBar: document.getElementById('password-strength-bar'),
      strengthText: document.getElementById('password-strength-text')
    };

    function setMode(mode) {
      state.mode = mode;
      clearError();

      const isLogin = mode === 'login';
      els.loginPanel.classList.toggle('hidden', !isLogin);
      els.registerPanel.classList.toggle('hidden', isLogin);
      els.tabIndicator.style.transform = isLogin ? 'translateX(0)' : 'translateX(100%)';

      els.loginTab.setAttribute('aria-selected', String(isLogin));
      els.registerTab.setAttribute('aria-selected', String(!isLogin));
      els.loginTab.classList.toggle('text-brand-900', isLogin);
      els.loginTab.classList.toggle('text-brand-600', !isLogin);
      els.registerTab.classList.toggle('text-brand-900', !isLogin);
      els.registerTab.classList.toggle('text-brand-600', isLogin);
    }

    function isValidEmail(email) {
      return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(String(email).trim());
    }

    function translateAuthError(message) {
      const msg = String(message || '').toLowerCase();
      if (msg.includes('invalid login credentials')) return 'Email o password non corretti';
      if (msg.includes('email not confirmed')) return 'Conferma la tua email prima di accedere';
      if (msg.includes('user already registered') || msg.includes('already registered')) return 'Un account con questa email esiste già';
      if (msg.includes('password should be at least') || msg.includes('password')) return 'Password troppo corta (minimo 8 caratteri)';
      if (msg.includes('failed to fetch') || msg.includes('network')) return 'Problema di connessione. Riprova tra qualche secondo.';
      return 'Si è verificato un errore. Riprova tra qualche secondo.';
    }

    function showError(message) {
      window.clearTimeout(state.errorTimeout);
      els.errorText.textContent = message;
      els.errorBox.classList.remove('hidden');
      state.errorTimeout = window.setTimeout(clearError, 5000);
    }

    function clearError() {
      window.clearTimeout(state.errorTimeout);
      els.errorBox.classList.add('hidden');
      els.errorText.textContent = '';
    }

    function spinnerSvg() {
      return '<svg class="spinner h-4 w-4" viewBox="0 0 24 24" fill="none" aria-hidden="true"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 0 1 8-8v4a4 4 0 0 0-4 4H4Z"></path></svg>';
    }

    function setButtonLoading(button, loading, loadingText, defaultText) {
      button.disabled = loading;
      button.innerHTML = loading ? spinnerSvg() + '<span>' + loadingText + '</span>' : '<span class="button-text">' + defaultText + '</span>';
    }

    function setAllInteractiveDisabled(disabled) {
      els.loginGoogle.disabled = disabled;
      els.registerGoogle.disabled = disabled;
      els.loginTab.disabled = disabled;
      els.registerTab.disabled = disabled;
      document.querySelectorAll('.password-toggle').forEach(btn => btn.disabled = disabled);
    }

    function passwordStrength(password) {
      const hasUppercase = /[A-ZÀ-Ý]/.test(password);
      const hasNumberOrSymbol = /[0-9\W_]/.test(password);

      if (!password) {
        return { level: 'empty', label: 'Inserisci una password', width: '0%', color: 'bg-transparent', textColor: 'text-brand-600' };
      }

      if (password.length < 6) {
        return { level: 'weak', label: 'Debole', width: '33%', color: 'bg-red-500', textColor: 'text-red-600' };
      }

      if (password.length >= 10 && hasUppercase && hasNumberOrSymbol) {
        return { level: 'strong', label: 'Forte', width: '100%', color: 'bg-emerald-500', textColor: 'text-emerald-700' };
      }

      if (password.length >= 6 && password.length <= 9 && hasUppercase) {
        return { level: 'medium', label: 'Media', width: '66%', color: 'bg-amber-500', textColor: 'text-amber-700' };
      }

      return { level: 'weak', label: 'Debole', width: '33%', color: 'bg-red-500', textColor: 'text-red-600' };
    }

    function updatePasswordStrength() {
      const result = passwordStrength(els.registerPassword.value);
      els.strengthBar.className = 'h-full rounded-full transition-all duration-300 ' + result.color;
      els.strengthBar.style.width = result.width;
      els.strengthText.className = 'mt-1.5 text-xs font-bold ' + result.textColor;
      els.strengthText.textContent = result.label;
    }

    async function handleGoogleAuth() {
      clearError();
      try {
        const { error } = await supabaseClient.auth.signInWithOAuth({
          provider: 'google',
          options: {
            redirectTo: window.location.origin + DASHBOARD_URL
          }
        });
        if (error) showError(translateAuthError(error.message));
      } catch (error) {
        showError(translateAuthError(error.message));
      }
    }

    async function handleLogin(event) {
      event.preventDefault();
      clearError();

      const email = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;

      if (!isValidEmail(email)) return showError('Inserisci un indirizzo email valido');
      if (!password) return showError('Inserisci la password');

      state.loading = true;
      setAllInteractiveDisabled(true);
      setButtonLoading(els.loginSubmit, true, 'Accesso in corso...', 'Accedi');

      try {
        const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
        if (error) {
          showError(translateAuthError(error.message));
          return;
        }
        window.location.href = DASHBOARD_URL;
      } catch (error) {
        showError(translateAuthError(error.message));
      } finally {
        state.loading = false;
        setAllInteractiveDisabled(false);
        setButtonLoading(els.loginSubmit, false, 'Accesso in corso...', 'Accedi');
      }
    }

    async function handleRegister(event) {
      event.preventDefault();
      clearError();

      const fullName = document.getElementById('register-name').value.trim();
      const email = document.getElementById('register-email').value.trim();
      const password = els.registerPassword.value;
      const acceptedTerms = els.termsCheckbox.checked;

      if (fullName.length < 2) return showError('Inserisci il tuo nome completo');
      if (!isValidEmail(email)) return showError('Inserisci un indirizzo email valido');
      if (password.length < 8) return showError('Password troppo corta (minimo 8 caratteri)');
      if (!acceptedTerms) return showError('Accetta i Termini di Servizio e la Privacy Policy');

      state.loading = true;
      setAllInteractiveDisabled(true);
      setButtonLoading(els.registerSubmit, true, 'Creazione account...', 'Crea account');

      try {
        const { error } = await supabaseClient.auth.signUp({
          email,
          password,
          options: {
            data: { full_name: fullName }
          }
        });
        if (error) {
          showError(translateAuthError(error.message));
          return;
        }
        window.location.href = DASHBOARD_URL;
      } catch (error) {
        showError(translateAuthError(error.message));
      } finally {
        state.loading = false;
        setAllInteractiveDisabled(false);
        els.registerSubmit.disabled = !els.termsCheckbox.checked;
        setButtonLoading(els.registerSubmit, false, 'Creazione account...', 'Crea account');
        els.registerSubmit.disabled = !els.termsCheckbox.checked;
      }
    }

    // Event listeners: tabs
    els.loginTab.addEventListener('click', () => setMode('login'));
    els.registerTab.addEventListener('click', () => setMode('register'));
    document.querySelectorAll('.switch-to-register').forEach(btn => btn.addEventListener('click', () => setMode('register')));
    document.querySelectorAll('.switch-to-login').forEach(btn => btn.addEventListener('click', () => setMode('login')));

    // Event listeners: forms and OAuth
    els.loginForm.addEventListener('submit', handleLogin);
    els.registerForm.addEventListener('submit', handleRegister);
    els.loginGoogle.addEventListener('click', handleGoogleAuth);
    els.registerGoogle.addEventListener('click', handleGoogleAuth);

    // Event listeners: password visibility
    document.querySelectorAll('.password-toggle').forEach(button => {
      button.addEventListener('click', () => {
        const input = document.getElementById(button.dataset.target);
        const isPassword = input.type === 'password';
        input.type = isPassword ? 'text' : 'password';
        button.setAttribute('aria-label', isPassword ? 'Nascondi password' : 'Mostra password');
        button.querySelector('.eye-open').classList.toggle('hidden', isPassword);
        button.querySelector('.eye-closed').classList.toggle('hidden', !isPassword);
      });
    });

    // Event listeners: validation UI
    els.termsCheckbox.addEventListener('change', () => {
      if (!state.loading) els.registerSubmit.disabled = !els.termsCheckbox.checked;
    });

    els.registerPassword.addEventListener('input', updatePasswordStrength);

    document.querySelectorAll('input').forEach(input => {
      input.addEventListener('input', clearError);
    });
  </script>
</body>
</html>
